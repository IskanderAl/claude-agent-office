<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Agent Office — LIVE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    font-family: 'JetBrains Mono', monospace;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: linear-gradient(90deg, #111118, #1a1a2e);
    border-bottom: 1px solid #f59e0b33;
    z-index: 100;
    position: relative;
  }
  .header h1 {
    font-size: 16px;
    color: #f59e0b;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .mode-badge {
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .mode-badge.live { background: #10b98133; color: #10b981; border: 1px solid #10b981; }
  .mode-badge.demo { background: #f59e0b22; color: #f59e0b; border: 1px solid #f59e0b55; }
  .stats {
    display: flex;
    gap: 20px;
    font-size: 11px;
    color: #888;
  }
  .stats .val { color: #f59e0b; font-weight: 700; }

  .office-wrapper {
    position: relative;
    width: 100%;
    height: calc(100vh - 50px);
    overflow: hidden;
  }

  /* ─── DARK OFFICE FLOOR ─── */
  .office {
    position: relative;
    width: 100%;
    height: 100%;
    background:
      /* Subtle grid pattern */
      repeating-linear-gradient(
        90deg,
        #ffffff05 0px, #ffffff05 1px,
        transparent 1px, transparent 60px
      ),
      repeating-linear-gradient(
        0deg,
        #ffffff05 0px, #ffffff05 1px,
        transparent 1px, transparent 60px
      ),
      /* Dark gradient base */
      radial-gradient(ellipse 80% 60% at 50% 40%, #141428, #0a0a14);
    background-color: #0d0d1a;
  }
  /* Subtle ambient glow */
  .office::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 500px 300px at 25% 30%, #f59e0b08, transparent),
      radial-gradient(ellipse 500px 300px at 75% 65%, #3b82f608, transparent);
    pointer-events: none;
    z-index: 0;
  }
  /* Vignette effect */
  .office::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 40%, #00000066);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── OFFICE ZONE (room) ─── */
  .zone {
    position: absolute;
    border: 1px solid #f59e0b33;
    border-radius: 12px;
    background: #ffffff06;
    z-index: 1;
    box-shadow: inset 0 0 30px #00000020;
  }
  .zone-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #f59e0b;
    padding: 10px 14px;
    border-bottom: 1px solid #f59e0b22;
    background: #00000040;
    border-radius: 12px 12px 0 0;
    font-weight: 700;
  }

  /* ─── OFFICE FURNITURE ─── */
  .desk {
    position: absolute;
    width: 70px;
    height: 45px;
    background: linear-gradient(135deg, #1a1a2e, #252540);
    border: 2px solid #3b3b5c;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 3px 8px #00000088, inset 0 1px 0 #ffffff08;
  }
  /* Monitor on desk */
  .desk::after {
    content: '';
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 26px;
    height: 18px;
    background: linear-gradient(180deg, #333, #1a1a1a);
    border: 1px solid #555;
    border-radius: 3px;
    box-shadow: 0 0 6px #3b82f633;
  }
  .desk.no-monitor::after { display: none; }

  /* Chair (small circle near desk) */
  .chair {
    position: absolute;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: radial-gradient(circle, #555, #333);
    border: 2px solid #666;
    z-index: 0;
    box-shadow: 0 2px 4px #00000044;
  }

  /* Bookshelf */
  .bookshelf {
    position: absolute;
    width: 50px;
    height: 80px;
    background: linear-gradient(180deg, #1a1a2e, #22223a);
    border: 2px solid #3b3b5c;
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    padding: 4px;
    box-shadow: 0 4px 12px #00000088;
  }
  .bookshelf .shelf-row {
    display: flex;
    gap: 2px;
    justify-content: center;
  }
  .bookshelf .book {
    width: 6px;
    border-radius: 1px;
  }

  /* Plant */
  .plant {
    position: absolute;
    font-size: 28px;
    filter: drop-shadow(0 2px 4px #00000066);
    z-index: 2;
  }

  /* Coffee machine */
  .coffee-machine {
    position: absolute;
    font-size: 22px;
    filter: drop-shadow(0 2px 4px #00000066);
  }

  /* Whiteboard */
  .whiteboard {
    position: absolute;
    background: linear-gradient(135deg, #1a1a2e, #252540);
    border: 3px solid #3b3b5c;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #888;
    box-shadow: 0 4px 12px #00000088;
    padding: 4px;
  }

  /* Server rack */
  .server-rack {
    position: absolute;
    width: 40px;
    height: 70px;
    background: linear-gradient(180deg, #1a1a2a, #111120);
    border: 1px solid #3b82f633;
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 5px 4px;
    box-shadow: 0 0 20px #3b82f611;
  }
  .server-rack .rack-led {
    width: 100%;
    height: 6px;
    background: #1a1a28;
    border-radius: 2px;
    position: relative;
  }
  .server-rack .rack-led::after {
    content: '';
    position: absolute;
    right: 3px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 3px;
    border-radius: 50%;
    animation: blink 2s ease-in-out infinite;
  }
  .server-rack .rack-led:nth-child(1)::after { background: #10b981; animation-delay: 0s; }
  .server-rack .rack-led:nth-child(2)::after { background: #3b82f6; animation-delay: 0.3s; }
  .server-rack .rack-led:nth-child(3)::after { background: #f59e0b; animation-delay: 0.6s; }
  .server-rack .rack-led:nth-child(4)::after { background: #10b981; animation-delay: 0.9s; }
  .server-rack .rack-led:nth-child(5)::after { background: #ef4444; animation-delay: 1.2s; }
  .server-rack .rack-led:nth-child(6)::after { background: #3b82f6; animation-delay: 1.5s; }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* Rug / carpet area */
  .rug {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(ellipse, #f59e0b08, #3b82f605, transparent);
    border: 1px solid #f59e0b11;
    z-index: 0;
  }

  /* ─── Bot ─── */
  .bot {
    position: absolute;
    transition: left 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                top 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    z-index: 10;
    cursor: pointer;
    filter: drop-shadow(0 0 12px var(--glow));
  }
  .bot:hover { transform: scale(1.15); }
  .bot:hover .bot-details { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }

  .bot-body {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--color);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    border: 3px solid var(--border);
    position: relative;
    animation: bob 2s ease-in-out infinite;
    box-shadow: 0 4px 15px var(--glow), 0 2px 8px #00000066;
  }
  /* Person body below the head */
  .bot-body::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 28px;
    height: 14px;
    background: var(--color);
    border-radius: 0 0 14px 14px;
    border: 2px solid var(--border);
    border-top: none;
    opacity: 0.8;
  }
  .bot-body.walking { animation: walk 0.4s ease-in-out infinite; }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  @keyframes walk {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-6px) rotate(3deg); }
  }

  .status-ring {
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: var(--color);
    animation: spin 1.5s linear infinite;
    opacity: 0;
  }
  .bot.working .status-ring { opacity: 1; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .bot-name {
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    font-weight: 700;
    color: #ffffff !important;
    white-space: nowrap;
    text-shadow: 0 1px 3px #000;
    background: #000000cc;
    padding: 3px 10px;
    border-radius: 6px;
    border: 1px solid #555;
    box-shadow: 0 2px 6px #00000066;
  }

  /* ─── Bubble ─── */
  .bubble {
    position: absolute;
    bottom: 66px;
    left: 50%;
    transform: translateX(-50%);
    background: #222222ee;
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 6px 14px;
    font-size: 10px;
    color: #fff;
    white-space: nowrap;
    max-width: 280px;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    box-shadow: 0 4px 20px #00000044;
  }
  .bubble::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 6px solid var(--border);
  }
  .bot.working .bubble,
  .bot:hover .bubble { opacity: 1; }

  /* ─── Detail Card ─── */
  .bot-details {
    position: absolute;
    top: 68px;
    left: 50%;
    transform: translateX(-50%) translateY(6px);
    background: #1a1a1aee;
    border: 2px solid #444;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 10px;
    width: 220px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    box-shadow: 0 8px 30px #000000aa;
    z-index: 20;
    backdrop-filter: blur(10px);
  }
  .bot-details .row {
    display: flex;
    justify-content: space-between;
    margin: 3px 0;
    color: #aaa;
  }
  .bot-details .row .v { color: #f59e0b; font-weight: 700; }
  .bot-details .progress-bar {
    height: 3px;
    background: #333;
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }
  .bot-details .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s;
  }

  /* ─── Log Panel ─── */
  .log-panel {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 110px;
    background: linear-gradient(0deg, #2a1f0fee, #2a1f0f00);
    padding: 10px 24px;
    display: flex;
    flex-direction: column-reverse;
    gap: 2px;
    overflow: hidden;
    z-index: 50;
    pointer-events: none;
  }
  .log-entry {
    font-size: 10px;
    color: #6a5a3a;
    white-space: nowrap;
    animation: fadeLog 6s forwards;
  }
  .log-entry .time { color: #4a3f2a; }
  .log-entry .agent { color: #f59e0b; }
  .log-entry .action { color: #8a7a5a; }
  .log-entry.real .agent { color: #10b981; }
  .log-entry.real .action { color: #10b98199; }

  @keyframes fadeLog {
    0% { opacity: 1; }
    70% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ─── Controls ─── */
  .controls {
    position: absolute;
    top: 12px;
    right: 16px;
    display: flex;
    gap: 8px;
    z-index: 50;
  }
  .btn {
    background: #ffffffcc;
    border: 2px solid #8a6a30;
    color: #4a3518;
    padding: 6px 14px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { border-color: #f59e0b; color: #f59e0b; }
  .btn.active { background: #f59e0b22; border-color: #f59e0b; color: #f59e0b; }

  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #f59e0b;
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
    animation: particle 1s ease-out forwards;
    z-index: 15;
  }
  @keyframes particle {
    0% { opacity: 0.8; transform: translate(0, 0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
  }

  .connections {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
  }
  .connections line {
    stroke: #f59e0b;
    stroke-width: 0.5;
    stroke-dasharray: 4 4;
    animation: dashMove 2s linear infinite;
    opacity: 0.15;
  }
  @keyframes dashMove { to { stroke-dashoffset: -16; } }

  /* Live pulse indicator */
  .live-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .live-dot.connected { background: #10b981; }
  .live-dot.disconnected { background: #ef4444; }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 currentColor; }
    50% { opacity: 0.6; box-shadow: 0 0 8px 2px currentColor; }
  }

  /* Ceiling lights */
  .ceiling-light {
    position: absolute;
    width: 60px;
    height: 4px;
    background: linear-gradient(90deg, transparent, #f59e0b22, transparent);
    border-radius: 2px;
    z-index: 0;
  }
  .ceiling-light::after {
    content: '';
    position: absolute;
    top: 4px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 120px;
    background: radial-gradient(ellipse, #f59e0b06, transparent);
    pointer-events: none;
  }

  /* Water cooler */
  .water-cooler {
    position: absolute;
    font-size: 20px;
    z-index: 2;
  }
</style>
</head>
<body>

<div class="header">
  <h1>
    🏢 Claude Agent Office
    <span class="mode-badge demo" id="modeBadge">
      <span class="live-dot disconnected" id="liveDot"></span>DEMO
    </span>
  </h1>
  <div class="stats">
    <div>Workers: <span class="val" id="stat-agents">0</span></div>
    <div>Events: <span class="val" id="stat-events">0</span></div>
    <div>Tools: <span class="val" id="stat-tools">0</span></div>
    <div>Uptime: <span class="val" id="stat-uptime">00:00</span></div>
    <div style="border-left:1px solid #333;padding-left:12px;">🪙 Tokens: <span class="val" id="stat-tokens" style="color:#f59e0b;">—</span></div>
    <div>Model: <span class="val" id="stat-model" style="color:#8b5cf6;">—</span></div>
  </div>
</div>

<div class="office-wrapper">
  <div class="office" id="office">

    <!-- ═══ CEILING LIGHTS ═══ -->
    <div class="ceiling-light" style="left:15%;top:8px;"></div>
    <div class="ceiling-light" style="left:45%;top:8px;"></div>
    <div class="ceiling-light" style="left:75%;top:8px;"></div>

    <!-- ═══ ZONE 1: READ / SEARCH ═══ -->
    <div class="zone" style="left:2%;top:3%;width:30%;height:42%;">
      <div class="zone-label">📖 Read / Search</div>
      <div class="desk" style="left:12%;top:35%;">📖</div>
      <div class="chair" style="left:calc(12% + 24px);top:calc(35% + 50px);"></div>
      <div class="desk" style="left:42%;top:35%;">🔍</div>
      <div class="chair" style="left:calc(42% + 24px);top:calc(35% + 50px);"></div>
      <div class="desk" style="left:12%;top:65%;">📂</div>
      <div class="chair" style="left:calc(12% + 24px);top:calc(65% + 50px);"></div>
      <div class="desk" style="left:42%;top:65%;">🗃️</div>
      <!-- Bookshelf -->
      <div class="bookshelf" style="right:8%;top:30%;">
        <div class="shelf-row">
          <div class="book" style="height:14px;background:#ef4444;"></div>
          <div class="book" style="height:12px;background:#3b82f6;"></div>
          <div class="book" style="height:16px;background:#10b981;"></div>
          <div class="book" style="height:11px;background:#f59e0b;"></div>
          <div class="book" style="height:14px;background:#8b5cf6;"></div>
        </div>
        <div class="shelf-row">
          <div class="book" style="height:13px;background:#ec4899;"></div>
          <div class="book" style="height:15px;background:#06b6d4;"></div>
          <div class="book" style="height:11px;background:#f97316;"></div>
          <div class="book" style="height:14px;background:#6366f1;"></div>
        </div>
        <div class="shelf-row">
          <div class="book" style="height:12px;background:#84cc16;"></div>
          <div class="book" style="height:15px;background:#e879f9;"></div>
          <div class="book" style="height:13px;background:#14b8a6;"></div>
          <div class="book" style="height:11px;background:#f43f5e;"></div>
        </div>
      </div>
    </div>

    <!-- ═══ ZONE 2: WRITE / EDIT ═══ -->
    <div class="zone" style="left:35%;top:3%;width:30%;height:42%;">
      <div class="zone-label">✏️ Write / Edit</div>
      <div class="desk" style="left:12%;top:35%;">✏️</div>
      <div class="chair" style="left:calc(12% + 24px);top:calc(35% + 50px);"></div>
      <div class="desk" style="left:42%;top:35%;">📝</div>
      <div class="chair" style="left:calc(42% + 24px);top:calc(35% + 50px);"></div>
      <div class="desk" style="left:27%;top:65%;">💾</div>
      <div class="chair" style="left:calc(27% + 24px);top:calc(65% + 50px);"></div>
      <!-- Whiteboard -->
      <div class="whiteboard" style="right:6%;top:35%;width:60px;height:80px;">
        <div style="text-align:center;line-height:1.3;">
          <span style="color:#ef4444;">TODO</span><br>
          <span style="color:#10b981;">✓ fix</span><br>
          <span style="color:#3b82f6;">→ test</span>
        </div>
      </div>
    </div>

    <!-- ═══ ZONE 3: BASH / EXECUTE ═══ -->
    <div class="zone" style="left:68%;top:3%;width:30%;height:42%;">
      <div class="zone-label">⚡ Bash / Execute</div>
      <div class="desk" style="left:12%;top:35%;">⚡</div>
      <div class="chair" style="left:calc(12% + 24px);top:calc(35% + 50px);"></div>
      <div class="desk" style="left:42%;top:35%;">🖥️</div>
      <div class="chair" style="left:calc(42% + 24px);top:calc(35% + 50px);"></div>
      <div class="desk" style="left:27%;top:65%;">⚙️</div>
      <div class="chair" style="left:calc(27% + 24px);top:calc(65% + 50px);"></div>
      <!-- Server rack -->
      <div class="server-rack" style="right:6%;top:30%;">
        <div class="rack-led"></div>
        <div class="rack-led"></div>
        <div class="rack-led"></div>
        <div class="rack-led"></div>
        <div class="rack-led"></div>
        <div class="rack-led"></div>
      </div>
    </div>

    <!-- ═══ ZONE 4: IDLE / LOUNGE ═══ -->
    <div class="zone" style="left:2%;top:50%;width:20%;height:42%;">
      <div class="zone-label">💤 Комната отдыха</div>
      <!-- Couch left -->
      <div style="position:absolute;left:8%;top:32%;font-size:28px;filter:drop-shadow(0 2px 4px #00000044);">🛋️</div>
      <!-- Couch right -->
      <div style="position:absolute;right:8%;top:32%;font-size:28px;filter:drop-shadow(0 2px 4px #00000044);transform:scaleX(-1);">🛋️</div>
      <!-- Coffee table -->
      <div class="desk no-monitor" style="left:35%;top:38%;width:40px;height:30px;font-size:14px;">🧠</div>
      <!-- Fridge -->
      <div style="position:absolute;left:8%;bottom:8%;font-size:30px;filter:drop-shadow(0 2px 4px #00000044);">🧊</div>
      <!-- AC unit -->
      <div style="position:absolute;right:8%;top:18%;font-size:18px;background:#1a1a2e;padding:2px 8px;border-radius:4px;border:1px solid #3b3b5c;box-shadow:0 2px 4px #00000066;">❄️</div>
      <!-- Rug -->
      <div class="rug" style="left:10%;top:50%;width:80%;height:30%;"></div>
      <!-- Plant -->
      <div class="plant" style="right:8%;bottom:8%;">🌿</div>
      <!-- Coffee machine -->
      <div class="coffee-machine" style="left:40%;bottom:8%;">☕</div>
      <!-- Water cooler -->
      <div style="position:absolute;right:35%;bottom:8%;font-size:22px;">🚰</div>
    </div>

    <!-- ═══ ZONE 5: WEB / RESEARCH ═══ -->
    <div class="zone" style="left:25%;top:50%;width:36%;height:40%;">
      <div class="zone-label">🌐 Web / Research</div>
      <div class="desk" style="left:10%;top:40%;">🌐</div>
      <div class="chair" style="left:calc(10% + 24px);top:calc(40% + 50px);"></div>
      <div class="desk" style="left:38%;top:40%;">🔎</div>
      <div class="chair" style="left:calc(38% + 24px);top:calc(40% + 50px);"></div>
      <div class="desk" style="left:66%;top:40%;">📊</div>
      <div class="chair" style="left:calc(66% + 24px);top:calc(40% + 50px);"></div>
      <!-- Globe decoration -->
      <div class="plant" style="right:5%;bottom:10%;">🌍</div>
    </div>

    <!-- ═══ ZONE 6: SUB-AGENTS ═══ -->
    <div class="zone" style="left:64%;top:50%;width:34%;height:40%;">
      <div class="zone-label">🤖 Sub-Agents</div>
      <div class="desk" style="left:15%;top:40%;">🤖</div>
      <div class="chair" style="left:calc(15% + 24px);top:calc(40% + 50px);"></div>
      <div class="desk" style="left:50%;top:40%;">🧬</div>
      <div class="chair" style="left:calc(50% + 24px);top:calc(40% + 50px);"></div>
      <!-- Server rack for agents -->
      <div class="server-rack" style="right:6%;top:30%;">
        <div class="rack-led"></div>
        <div class="rack-led"></div>
        <div class="rack-led"></div>
        <div class="rack-led"></div>
        <div class="rack-led"></div>
        <div class="rack-led"></div>
      </div>
    </div>

    <!-- ═══ DECORATIONS ═══ -->
    <div class="plant" style="left:1%;top:46%;">🪴</div>
    <div class="plant" style="right:1%;top:46%;">🌱</div>
    <div class="water-cooler" style="left:33%;top:47%;">🎯</div>
    <div class="plant" style="left:63%;top:47%;">🪴</div>

    <svg class="connections" id="connections"></svg>
    <div class="log-panel" id="logPanel"></div>
  </div>

  <div class="controls">
    <button class="btn" onclick="addWorker()">+ Add Worker</button>
    <button class="btn" id="modeBtn" onclick="toggleMode()">🔄 Switch to Demo</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  ZONE MAPPING — tool name → office zone coords (percentage-based)
// ═══════════════════════════════════════════════

function pct(xPct, yPct) {
  const officeEl = document.getElementById('office');
  return {
    x: officeEl.clientWidth * xPct / 100,
    y: officeEl.clientHeight * yPct / 100,
  };
}

function getZoneCoords(toolName) {
  const map = {
    'Read':      [() => pct(8, 18),  () => pct(16, 18)],
    'Grep':      [() => pct(16, 18), () => pct(8, 30)],
    'Glob':      [() => pct(8, 30),  () => pct(16, 30)],
    'Write':     [() => pct(42, 18), () => pct(50, 18)],
    'Edit':      [() => pct(50, 18), () => pct(46, 28)],
    'Bash':      [() => pct(75, 18), () => pct(83, 18)],
    'Agent':     [() => pct(75, 65), () => pct(82, 65)],
    'WebSearch': [() => pct(32, 65), () => pct(42, 65)],
    'WebFetch':  [() => pct(42, 65), () => pct(50, 65)],
    '_idle':     [() => pct(4, 56), () => pct(15, 56), () => pct(4, 66), () => pct(15, 66), () => pct(4, 76), () => pct(15, 76), () => pct(10, 61)],
    '_think':    [() => pct(4, 56), () => pct(15, 56), () => pct(4, 66), () => pct(15, 66), () => pct(4, 76), () => pct(15, 76), () => pct(10, 61)],
  };
  const fns = map[toolName] || map['_idle'];
  return fns[Math.floor(Math.random() * fns.length)]();
}

const TOOL_STYLES = {
  'Read':      { emoji: '📖', color: '#3b82f6', border: '#60a5fa', glow: '#3b82f644' },
  'Grep':      { emoji: '🔍', color: '#06b6d4', border: '#22d3ee', glow: '#06b6d444' },
  'Glob':      { emoji: '📂', color: '#0ea5e9', border: '#38bdf8', glow: '#0ea5e944' },
  'Write':     { emoji: '✏️', color: '#10b981', border: '#34d399', glow: '#10b98144' },
  'Edit':      { emoji: '📝', color: '#14b8a6', border: '#2dd4bf', glow: '#14b8a644' },
  'Bash':      { emoji: '⚡', color: '#f59e0b', border: '#fbbf24', glow: '#f59e0b44' },
  'Agent':     { emoji: '🤖', color: '#8b5cf6', border: '#a78bfa', glow: '#8b5cf644' },
  'WebSearch': { emoji: '🌐', color: '#ec4899', border: '#f472b6', glow: '#ec489944' },
  'WebFetch':  { emoji: '🔗', color: '#e879f9', border: '#f0abfc', glow: '#e879f944' },
  '_default':  { emoji: '🔧', color: '#6b7280', border: '#9ca3af', glow: '#6b728044' },
};

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let workers = {};
let mode = 'live';
let lastEventTimestamp = 0;
let totalEvents = 0;
let totalTools = 0;
let startTime = Date.now();
let demoIntervals = [];

const office = document.getElementById('office');

// ═══════════════════════════════════════════════
//  KAZAKH BOT NAMES
// ═══════════════════════════════════════════════
const TOOL_TO_BOT = {
  'Read':      { name: 'Ербол',    role: 'чтение',      emoji: '🧑‍💻' },
  'Grep':      { name: 'Нурлан',   role: 'поиск',       emoji: '🕵️' },
  'Glob':      { name: 'Нурлан',   role: 'поиск',       emoji: '🕵️' },
  'Write':     { name: 'Бауыржан', role: 'код',         emoji: '👷' },
  'Edit':      { name: 'Айдос',    role: 'код',         emoji: '👨‍💻' },
  'Bash':      { name: 'Дамир',    role: 'консоль',     emoji: '🧑‍🔧' },
  'Agent':     { name: 'Искандер', role: 'субагент',    emoji: '🧑‍🏫' },
  'WebSearch': { name: 'Арман',    role: 'веб',         emoji: '🧑‍🚀' },
  'WebFetch':  { name: 'Арман',    role: 'веб',         emoji: '🧑‍🚀' },
  '_default':  { name: 'Тимур',    role: 'утилиты',     emoji: '🧑‍🎨' },
};

let botNameIndex = 0;
const BOT_NAMES_EXTRA = [
  { name: 'Кайрат',   role: 'тесты',       emoji: '🧑‍🔬' },
  { name: 'Асет',     role: 'анализ',      emoji: '👨‍💼' },
  { name: 'Жандос',   role: 'дебаг',       emoji: '🧑‍🏭' },
  { name: 'Серик',    role: 'скорость',    emoji: '🏃' },
];

function getBotNameForTool(tool) {
  return TOOL_TO_BOT[tool] || TOOL_TO_BOT['_default'];
}

function getNextBotName() {
  const bot = BOT_NAMES_EXTRA[botNameIndex % BOT_NAMES_EXTRA.length];
  botNameIndex++;
  return bot;
}

// ═══════════════════════════════════════════════
//  WORKER (visual bot in the office)
// ═══════════════════════════════════════════════
function getOrCreateWorker(sessionId, toolName) {
  if (workers[sessionId]) return workers[sessionId];

  const style = TOOL_STYLES['_default'];
  const pos = getZoneCoords('_idle');

  const el = document.createElement('div');
  el.className = 'bot';
  el.style.setProperty('--color', style.color);
  el.style.setProperty('--border', style.border);
  el.style.setProperty('--glow', style.glow);
  el.style.left = pos.x + 'px';
  el.style.top = pos.y + 'px';

  const rawId = sessionId ? sessionId.substring(0, 6) : 'main';
  const shortId = rawId.replace(/[^a-zA-Z0-9\-]/g, '');

  el.innerHTML = `
    <div class="bubble"><span class="msg">Waiting...</span></div>
    <div class="bot-body">🧑‍💻<div class="status-ring"></div></div>
    <div class="bot-name"></div>
    <div class="bot-details">
      <div class="bot-title" style="font-weight:700;margin-bottom:4px;"></div>
      <div class="row"><span>Session</span><span class="v session-text"></span></div>
      <div class="row"><span>Status</span><span class="v status-text">idle</span></div>
      <div class="row"><span>Last tool</span><span class="v tool-text">-</span></div>
      <div class="row"><span>Events</span><span class="v events-text">0</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
    </div>
  `;

  const botInfo = getBotNameForTool(toolName) || getNextBotName();
  const displayName = `${botInfo.name} - ${botInfo.role}`;
  const fullTitle = `${botInfo.emoji} ${botInfo.name} — ${botInfo.role}`;

  el.querySelector('.bot-name').textContent = displayName;
  el.querySelector('.bot-title').textContent = fullTitle;
  el.querySelector('.bot-title').style.color = style.color;
  el.querySelector('.session-text').textContent = shortId;
  el.querySelector('.progress-fill').style.background = style.color;

  office.appendChild(el);

  const worker = {
    id: sessionId,
    shortId: displayName,
    el,
    x: pos.x,
    y: pos.y,
    events: 0,
    lastTool: null,
    idleTimer: null,
  };

  workers[sessionId] = worker;
  updateStats();
  addLog(shortId, 'appeared in office', true);
  spawnParticles(pos.x + 24, pos.y + 24, style.color);

  return worker;
}

function moveWorkerToTool(worker, toolName, detail) {
  const style = TOOL_STYLES[toolName] || TOOL_STYLES['_default'];
  const dest = getZoneCoords(toolName);

  worker.el.style.setProperty('--color', style.color);
  worker.el.style.setProperty('--border', style.border);
  worker.el.style.setProperty('--glow', style.glow);

  worker.x = dest.x + Math.random() * 30 - 15;
  worker.y = dest.y + Math.random() * 30 - 15;
  worker.el.style.left = worker.x + 'px';
  worker.el.style.top = worker.y + 'px';

  const body = worker.el.querySelector('.bot-body');
  body.textContent = '';
  body.innerHTML = style.emoji + '<div class="status-ring"></div>';
  body.classList.add('walking');
  setTimeout(() => body.classList.remove('walking'), 1500);

  worker.el.classList.add('working');
  worker.events++;
  worker.lastTool = toolName;
  totalTools++;

  const msg = worker.el.querySelector('.msg');
  msg.textContent = detail || `Using ${toolName}...`;

  worker.el.querySelector('.status-text').textContent = 'working';
  worker.el.querySelector('.status-text').style.color = '#10b981';
  worker.el.querySelector('.tool-text').textContent = toolName;
  worker.el.querySelector('.events-text').textContent = worker.events;
  worker.el.querySelector('.progress-fill').style.width = '100%';
  worker.el.querySelector('.progress-fill').style.background = style.color;

  clearTimeout(worker.idleTimer);
  worker.idleTimer = setTimeout(() => {
    worker.el.classList.remove('working');
    worker.el.querySelector('.msg').textContent = '💤 Waiting...';
    worker.el.querySelector('.status-text').textContent = 'idle';
    worker.el.querySelector('.status-text').style.color = '#888';
    worker.el.querySelector('.progress-fill').style.width = '0%';

    const idle = getZoneCoords('_idle');
    worker.x = idle.x;
    worker.y = idle.y;
    worker.el.style.left = worker.x + 'px';
    worker.el.style.top = worker.y + 'px';
  }, 5000);

  spawnParticles(worker.x + 24, worker.y + 24, style.color);
}

// ═══════════════════════════════════════════════
//  LIVE MODE — Poll events.json
// ═══════════════════════════════════════════════
let pollInterval = null;

function startLiveMode() {
  mode = 'live';
  stopDemo();

  document.getElementById('modeBadge').className = 'mode-badge live';
  document.getElementById('modeBadge').innerHTML = '<span class="live-dot connected" id="liveDot"></span>LIVE';
  document.getElementById('modeBtn').textContent = '🔄 Switch to Demo';

  addLog('System', '🟢 Live mode — polling events.json...', false);

  pollInterval = setInterval(async () => {
    try {
      const resp = await fetch('events.json?t=' + Date.now(), {
        cache: 'no-store',
        headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
      });
      if (!resp.ok) {
        setDisconnected();
        return;
      }
      const events = await resp.json();
      setConnected();

      const newEvents = events.filter(evt => evt.timestamp > lastEventTimestamp);
      for (const evt of newEvents) {
        totalEvents++;

        const toolKey = evt.tool || 'unknown';
        const botInfo = getBotNameForTool(toolKey);
        const workerId = 'bot-' + botInfo.name;
        const worker = getOrCreateWorker(workerId, evt.tool);
        moveWorkerToTool(worker, evt.tool, evt.detail);
        addLog(worker.shortId, evt.detail || `${evt.tool} tool`, true);

        if (evt.tool === 'Agent' && evt.agent_name) {
          addLog('System', `🤖 ${botInfo.name} запустил: ${evt.agent_name}`, true);
        }
      }
      if (events.length > 0) {
        lastEventTimestamp = events[events.length - 1].timestamp;
      }
      updateStats();
    } catch (e) {
      setDisconnected();
    }
  }, 1000);
}

function setConnected() {
  const dot = document.getElementById('liveDot');
  if (dot) { dot.className = 'live-dot connected'; }
  const badge = document.getElementById('modeBadge');
  badge.className = 'mode-badge live';
  badge.innerHTML = '<span class="live-dot connected" id="liveDot"></span>LIVE';
}

function setDisconnected() {
  const dot = document.getElementById('liveDot');
  if (dot) { dot.className = 'live-dot disconnected'; }
}

function stopLiveMode() {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = null;
}

// ═══════════════════════════════════════════════
//  DEMO MODE — Simulated activity
// ═══════════════════════════════════════════════
const DEMO_TOOLS = ['Read', 'Write', 'Edit', 'Bash', 'Grep', 'Glob', 'Agent', 'WebSearch'];
const DEMO_DETAILS = {
  'Read':      ['Reading index.ts...', 'Reading config.json...', 'Reading package.json...', 'Reading README.md...'],
  'Write':     ['Writing component.tsx...', 'Creating test file...', 'Writing utils.ts...'],
  'Edit':      ['Fixing import path...', 'Refactoring function...', 'Updating type def...'],
  'Bash':      ['$ npm run build', '$ git status', '$ npm test', '$ tsc --noEmit'],
  'Grep':      ['Searching "useState"...', 'Finding "export"...', 'Pattern: "TODO"...'],
  'Glob':      ['Finding **/*.tsx...', 'Matching *.test.ts...', 'Scanning src/...'],
  'Agent':     ['🤖 Explore: scan codebase', '🤖 Plan: design architecture', '🤖 Review: check code'],
  'WebSearch': ['Searching: "React patterns"', 'Looking up: "TypeScript generics"'],
};

let demoWorkerCount = 0;

function startDemo() {
  mode = 'demo';
  stopLiveMode();

  document.getElementById('modeBadge').className = 'mode-badge demo';
  document.getElementById('modeBadge').innerHTML = '<span class="live-dot disconnected" id="liveDot"></span>DEMO';
  document.getElementById('modeBtn').textContent = '🔄 Switch to Live';

  addLog('System', '🟡 Demo mode — simulating activity', false);

  for (let i = 0; i < 3; i++) {
    const id = 'demo-' + (demoWorkerCount++);
    getOrCreateWorker(id);
  }

  function randomDemoAction() {
    const ids = Object.keys(workers);
    if (ids.length === 0) return;

    const workerId = ids[Math.floor(Math.random() * ids.length)];
    const worker = workers[workerId];
    const tool = DEMO_TOOLS[Math.floor(Math.random() * DEMO_TOOLS.length)];
    const details = DEMO_DETAILS[tool];
    const detail = details[Math.floor(Math.random() * details.length)];

    totalEvents++;
    moveWorkerToTool(worker, tool, detail);
    addLog(worker.shortId, detail, false);
    updateStats();
  }

  demoIntervals.push(setInterval(randomDemoAction, 2000 + Math.random() * 2000));
  demoIntervals.push(setInterval(randomDemoAction, 3000 + Math.random() * 3000));

  demoIntervals.push(setInterval(() => {
    if (Object.keys(workers).length < 8 && Math.random() < 0.3) {
      const id = 'demo-' + (demoWorkerCount++);
      getOrCreateWorker(id);
    }
  }, 8000));
}

function stopDemo() {
  demoIntervals.forEach(id => clearInterval(id));
  demoIntervals = [];
}

// ═══════════════════════════════════════════════
//  UI Helpers
// ═══════════════════════════════════════════════
function addLog(agent, action, isReal) {
  const panel = document.getElementById('logPanel');
  const entry = document.createElement('div');
  entry.className = 'log-entry' + (isReal ? ' real' : '');
  const now = new Date();
  const time = now.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  const timeEl = document.createElement('span');
  timeEl.className = 'time';
  timeEl.textContent = `[${time}]`;
  const agentEl = document.createElement('span');
  agentEl.className = 'agent';
  agentEl.textContent = agent;
  const actionEl = document.createElement('span');
  actionEl.className = 'action';
  actionEl.textContent = action;
  entry.append(timeEl, ' ', agentEl, ' ', actionEl);
  panel.prepend(entry);
  if (panel.children.length > 30) panel.lastChild.remove();
  setTimeout(() => entry.remove(), 8000);
}

function spawnParticles(cx, cy, color) {
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = cx + 'px';
    p.style.top = cy + 'px';
    p.style.background = color;
    const angle = Math.random() * Math.PI * 2;
    const dist = 20 + Math.random() * 30;
    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    office.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

function updateStats() {
  document.getElementById('stat-agents').textContent = Object.keys(workers).length;
  document.getElementById('stat-events').textContent = totalEvents;
  document.getElementById('stat-tools').textContent = totalTools;
}

function updateUptime() {
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const s = String(elapsed % 60).padStart(2, '0');
  document.getElementById('stat-uptime').textContent = `${m}:${s}`;
  requestAnimationFrame(updateUptime);
}
updateUptime();

function updateConnections() {
  const svg = document.getElementById('connections');
  svg.innerHTML = '';
  const ids = Object.keys(workers);
  const working = ids.filter(id => workers[id].el.classList.contains('working'));
  for (let i = 0; i < working.length - 1; i++) {
    const a = workers[working[i]], b = workers[working[i + 1]];
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', a.x + 24);
    line.setAttribute('y1', a.y + 24);
    line.setAttribute('x2', b.x + 24);
    line.setAttribute('y2', b.y + 24);
    const style = TOOL_STYLES[a.lastTool] || TOOL_STYLES['_default'];
    line.style.stroke = style.color;
    svg.appendChild(line);
  }
  requestAnimationFrame(updateConnections);
}
updateConnections();

function addWorker() {
  const id = 'manual-' + Date.now().toString(36);
  getOrCreateWorker(id);
}

function toggleMode() {
  if (mode === 'live') {
    startDemo();
  } else {
    Object.values(workers).forEach(w => w.el.remove());
    workers = {};
    lastEventTimestamp = 0;
    totalEvents = 0;
    totalTools = 0;
    startLiveMode();
  }
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
(async function init() {
  try {
    const resp = await fetch('events.json?t=' + Date.now(), {
      cache: 'no-store',
      headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
    });
    if (resp.ok) {
      startLiveMode();
      return;
    }
  } catch (e) {}
  startDemo();
})();

// ═══════════════════════════════════════════════
//  TOKEN STATS
// ═══════════════════════════════════════════════
function formatTokens(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
  return String(n);
}

async function fetchTokenStats() {
  try {
    const resp = await fetch('/api/stats?t=' + Date.now(), { cache: 'no-store' });
    if (!resp.ok) return;
    const stats = await resp.json();

    let totalInput = 0, totalOutput = 0, totalCache = 0;
    let currentModel = '—';
    const models = stats.modelUsage || {};

    for (const [model, usage] of Object.entries(models)) {
      totalInput += (usage.inputTokens || 0);
      totalOutput += (usage.outputTokens || 0);
      totalCache += (usage.cacheReadInputTokens || 0) + (usage.cacheCreationInputTokens || 0);
    }

    let maxOut = 0;
    for (const [model, usage] of Object.entries(models)) {
      if ((usage.outputTokens || 0) > maxOut) {
        maxOut = usage.outputTokens;
        currentModel = model
          .replace('claude-', '')
          .replace(/-\d{8,}$/, '');
      }
    }

    const total = totalInput + totalOutput + totalCache;
    document.getElementById('stat-tokens').textContent = formatTokens(total);
    document.getElementById('stat-tokens').title =
      `Input: ${formatTokens(totalInput)} | Output: ${formatTokens(totalOutput)} | Cache: ${formatTokens(totalCache)}`;
    document.getElementById('stat-model').textContent = currentModel;
  } catch (e) {}
}

fetchTokenStats();
setInterval(fetchTokenStats, 10000);

// ═══════════════════════════════════════════════
//  RESPONSIVE — recalculate on resize
// ═══════════════════════════════════════════════
window.addEventListener('resize', () => {
  // Move idle workers to new positions
  Object.values(workers).forEach(w => {
    if (!w.el.classList.contains('working')) {
      const pos = getZoneCoords('_idle');
      w.x = pos.x + Math.random() * 40;
      w.y = pos.y + Math.random() * 30;
      w.el.style.left = w.x + 'px';
      w.el.style.top = w.y + 'px';
    }
  });
});

</script>
